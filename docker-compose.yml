version: "3.8"

services:
  # FastAPI Backend
  api:
    build: .
    container_name: smartticket-api
    ports:
      - "8000:8000"
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Streamlit Dashboard
  dashboard:
    build: .
    container_name: smartticket-dashboard
    ports:
      - "8501:8501"
    command: streamlit run src/dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped